<body>
<div class="background-animation"></div>

<div class="intro-container">
    <!-- Logo with animated letters -->
    <div class="logo" id="logo">
        <span>f</span>
        <span>l</span>
        <span>u</span>
        <span>n</span>
        <span>o</span>
    </div>

    <!-- Tagline -->
    <div class="brand-description" id="brandDescription">
        <p>Care In Every Drop</p>
    </div>
    <!-- Explore button -->
    <a href="https://myfluno.wixsite.com/fluno-1" class="explore-btn" id="exploreBtn" target="_blank">Explore More</a>
</div>
<!-- Script -->
<script src="./js/script.js"></script>
<script>
    // Optional: Animate letters on load
    const letters = document.querySelectorAll('.logo span');
    letters.forEach(letter => {
        letter.style.animation = 'letterReveal 1s forwards , fadeZoom 5s forwards ease-in-out';

    });

    // Optional: Adaptive logo color based on background brightness
    function updateLogoColor() {
        const logo = document.querySelectorAll('.logo span');
        const bgColor = window.getComputedStyle(document.body).backgroundColor;
        const rgb = bgColor.match(/\d+/g);
        const brightness = (parseInt(rgb[0]) * 299 + parseInt(rgb[1]) * 587 + parseInt(rgb[2]) * 114) / 1000;

        logo.forEach(l => {
            l.style.color = brightness < 128 ? '#fff' : '#BD7EFA';
        });
    }

    window.addEventListener('load', updateLogoColor);
    window.addEventListener('resize', updateLogoColor);


</script>
</body>
